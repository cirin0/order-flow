<!DOCTYPE html>
<html lang="ua" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="page-wrapper">
  <div class="background-wrapper">
    <div class="cityscape"></div>
    <div class="cityscape-revers"></div>
  </div>

  <div class="container">
    <div class="login-container">
      <h2>Встановлення нового паролю</h2>

      <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
      <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

      <form th:action="@{/user/reset-password}" method="post">
        <input type="hidden" name="email" th:value="${email}">

        <div class="form-group">
          <label for="verificationCode" class="form-label">Код підтвердження:</label>
          <input type="text" id="verificationCode" name="verificationCode" required class="form-control"
                 placeholder="Введіть 6-значний код">
        </div>

        <div class="form-group">
          <label for="newPassword" class="form-label">Новий пароль:</label>
          <input type="password" id="newPassword" name="newPassword" required class="form-control"
                 minlength="6" placeholder="Мінімум 6 символів">
        </div>

        <div class="form-group">
          <label for="confirmPassword" class="form-label">Підтвердіть пароль:</label>
          <input type="password" id="confirmPassword" required class="form-control"
                 placeholder="Введіть пароль повторно">
        </div>

        <button type="submit" id="submitButton" class="btn btn-login" disabled>Змінити пароль</button>
      </form>

      <div class="register-link">
        <p class="mb-0">
          <a th:href="@{/user/login}" class="text-muted">Повернутися до входу</a>
        </p>
      </div>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const newPasswordInput = document.getElementById('newPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const submitButton = document.getElementById('submitButton');

    function validatePasswords() {
      submitButton.disabled = !(newPasswordInput.value.length >= 6 &&
        newPasswordInput.value === confirmPasswordInput.value);
    }

    newPasswordInput.addEventListener('input', validatePasswords);
    confirmPasswordInput.addEventListener('input', validatePasswords);
  });
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
